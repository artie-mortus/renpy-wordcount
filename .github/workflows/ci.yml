name: CI

on:
  push:
  pull_request:

jobs:
  build-test-performance:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7
      - name: Install dependencies
        # nodejs is required by CMake configure even though parity tests are skipped below.
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake nodejs xvfb libwxgtk3.2-dev libwxgtk-media3.2-dev libcurl4-openssl-dev libssl-dev
      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release -DSAY_COUNT_WARNINGS_AS_ERRORS=ON
      - name: Build
        run: cmake --build build -j2 --target say-count say-count-tests say-count-chat-ui-tests
      - name: Test
        # Parity tests need the reference JS app checked out as a sibling
        # (../words-til-vn), which is not available on CI.
        run: xvfb-run -a ctest --test-dir build --output-on-failure -E parser-parity
      - name: Check performance thresholds
        run: cmake --build build -j2 --target performance-check

  sanitizers:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake nodejs libwxgtk3.2-dev libwxgtk-media3.2-dev libcurl4-openssl-dev libssl-dev
      - name: Configure sanitizers
        run: cmake -B build-sanitize -DCMAKE_BUILD_TYPE=Debug -DSAY_COUNT_ENABLE_SANITIZERS=ON -DSAY_COUNT_WARNINGS_AS_ERRORS=ON
      - name: Build core tests
        run: cmake --build build-sanitize -j2 --target say-count-tests
      - name: Run core tests under sanitizers
        env:
          ASAN_OPTIONS: detect_leaks=0
          UBSAN_OPTIONS: print_stacktrace=1
        run: build-sanitize/say-count-tests
